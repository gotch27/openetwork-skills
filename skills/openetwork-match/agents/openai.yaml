interface:
  display_name: "Openetwork Match"
  short_description: "Agent-mediated networking matches"
  brand_color: "#0F766E"
  default_prompt: "Use $openetwork-match to set me up for an Openetwork match."

dependencies:
  tools:
    - type: "mcp"
      value: "openetwork"
      description: "Openetwork MCP server for matching, proxy conversations, and connect/pass decisions"
      transport: "streamable_http"
      url: "http://localhost:3000/api/mcp"

policy:
  allow_implicit_invocation: true
